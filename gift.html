<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gift Code - Raja Luck VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        /* ORIGINAL CSS - NO CHANGES */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f5f5f9; color: #333; padding-bottom: 30px; }
        .header { background: #3b236d; padding: 15px; display: flex; align-items: center; justify-content: center; position: sticky; top: 0; z-index: 100; color: white; }
        .header i { position: absolute; left: 15px; font-size: 20px; cursor: pointer; padding: 5px; }
        .header-title { font-size: 18px; font-weight: bold; }
        .banner { background: linear-gradient(135deg, #2b1154, #4a2c82); height: 180px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .banner-icon { font-size: 80px; color: #f6c745; text-shadow: 0 10px 20px rgba(0,0,0,0.5); z-index: 1; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        .container { padding: 0 15px; margin-top: -20px; position: relative; z-index: 10; }
        .gift-card { background: white; border-radius: 15px; padding: 25px 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); border-top: 4px solid #f6c745; }
        .greeting { font-size: 18px; font-weight: 900; color: #2f3542; margin-bottom: 5px; }
        .sub-greeting { font-size: 13px; color: #747d8c; margin-bottom: 20px; }
        .input-label { font-size: 14px; font-weight: bold; color: #3b236d; margin-bottom: 10px; display: block; }
        .code-input { width: 100%; background: #f1f2f6; border: 1px solid #dfe4ea; border-radius: 30px; padding: 15px 20px; font-size: 14px; font-weight: bold; color: #2f3542; outline: none; margin-bottom: 20px; text-align: center; letter-spacing: 1px; }
        .code-input:focus { border-color: #6c5ce7; background: #fff; }
        .btn-receive { width: 100%; background: linear-gradient(135deg, #7b4397, #dc2430); color: white; border: none; padding: 15px; border-radius: 30px; font-size: 16px; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.2s; margin-bottom: 15px; }
        .btn-receive:active { transform: scale(0.97); }
        .warning-text { text-align: center; font-size: 11px; font-weight: bold; color: #e17055; margin-bottom: 25px; }
        .tg-desc { text-align: center; font-size: 12px; color: #747d8c; line-height: 1.5; margin-bottom: 15px; }
        .btn-telegram { width: 100%; background: #0088cc; color: white; border: none; padding: 14px; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 10px rgba(0, 136, 204, 0.3); }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-chevron-left" onclick="window.location.href='my.html'"></i>
        <div class="header-title">Gift</div>
    </div>

    <div class="banner">
        <i class="fas fa-gift banner-icon"></i>
    </div>

    <div class="container">
        <div class="gift-card">
            <div class="greeting">Hello dear member!</div>
            <div class="sub-greeting">we have a gift for you</div>

            <label class="input-label">Please enter the gift redemption code below</label>
            <input type="text" id="giftInput" class="code-input" placeholder="Please enter the redemption code">

            <button class="btn-receive" id="receiveBtn" onclick="claimGift()">Receive</button>

            <div class="warning-text">Security verification is required to claim bonuses.</div>

            <div class="tg-desc">
                Follow the Telegram channel at 8pm every night to participate and get free rewards
            </div>

            <button class="btn-telegram" onclick="window.open('https://t.me/z0pji', '_blank')">
                <i class="fab fa-telegram-plane"></i> Telegram Channel
            </button>
        </div>
    </div>

    <script>
        // 🚨 1. FIREBASE CONFIG (SAME AS BEFORE) 🚨
        var firebaseConfig = { 
            apiKey: "AIzaSyA9a_UA1cbr7sx0G1lu90ig18DfEDvmvgk", 
            authDomain: "ff-warzone-9c820.firebaseapp.com", 
            projectId: "ff-warzone-9c820", 
            storageBucket: "ff-warzone-9c820.firebasestorage.app", 
            messagingSenderId: "267357764090", 
            appId: "1:267357764090:web:0691111afd07cb0ff20c43" 
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        var fireDB = firebase.firestore();

        var userDocId = "";
        var userUid = localStorage.getItem("r_uid");

        // 🚨 2. GET USER INFO FROM CLOUD 🚨
        function loadUser() {
            if(!userUid) return;
            fireDB.collection("users").where("uid", "==", parseInt(userUid)).get().then((snap) => {
                snap.forEach((doc) => { userDocId = doc.id; });
            });
        }

        // 🚨 3. CLAIM GIFT LOGIC (SECURE) 🚨
        async function claimGift() {
            var inputCode = document.getElementById("giftInput").value.trim().toUpperCase();
            var btn = document.getElementById("receiveBtn");

            if(inputCode === "") { alert("Please enter a gift code!"); return; }
            if(!userDocId) { alert("Syncing... Try again in 2 seconds."); return; }

            btn.disabled = true;
            btn.innerText = "Processing...";

            try {
                // 1. Check if the code exists in Firebase
                const giftSnap = await fireDB.collection("gift_codes").doc(inputCode).get();
                
                if (!giftSnap.exists) {
                    alert("❌ Invalid Gift Code or it has expired!");
                    btn.disabled = false; btn.innerText = "Receive";
                    return;
                }

                const giftData = giftSnap.data();
                const rewardAmt = Number(giftData.amount);

                // 2. Check if user already claimed this specific code
                const userSnap = await fireDB.collection("users").doc(userDocId).get();
                const userData = userSnap.data();
                const claimedGifts = userData.claimedGifts || [];

                if (claimedGifts.includes(inputCode)) {
                    alert("⚠️ You have already claimed this gift code!");
                    btn.disabled = false; btn.innerText = "Receive";
                    return;
                }

                // 3. Update User Balance, Wagering, and Claim History in ONE GO
                var extraWager = rewardAmt * 3;
                
                await fireDB.collection("users").doc(userDocId).update({
                    balance: firebase.firestore.FieldValue.increment(rewardAmt),
                    wagerTarget: firebase.firestore.FieldValue.increment(extraWager),
                    claimedGifts: firebase.firestore.FieldValue.arrayUnion(inputCode)
                });

                // Update Local backup
                localStorage.setItem("r_bal", (userData.balance || 0) + rewardAmt);

                alert("✅ Gift Claimed Successfully!\n\nReward: ₹" + rewardAmt + "\n3X Wagering Added: ₹" + extraWager);
                document.getElementById("giftInput").value = "";

            } catch (error) {
                console.error(error);
                alert("Something went wrong. Try again.");
            }

            btn.disabled = false;
            btn.innerText = "Receive";
        }

        window.onload = loadUser;
    </script>
</body>
</html>
