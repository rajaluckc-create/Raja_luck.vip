<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flip Coin - Raja Luck</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        /* 🚨 FULL BLACK THEME - NO CHANGES 🚨 */
        body { margin: 0; padding: 0; background-color: #000000; color: #ffffff; font-family: Arial, sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background-color: #111; border-bottom: 1px solid #333; }
        .logo { font-size: 20px; font-weight: 900; color: #f1c40f; font-family: 'Impact', sans-serif; letter-spacing: 1px;}
        .bal-box { font-size: 14px; font-weight: bold; color: #2ecc71; background: #222; padding: 5px 12px; border-radius: 20px; border: 1px solid #444;}
        .history { display: flex; gap: 8px; padding: 10px; overflow-x: auto; background: #0a0a0a; border-bottom: 1px solid #222;}
        .badge { min-width: 25px; text-align: center; padding: 5px 8px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        .badge-h { background: #f39c12; color: #000; }
        .badge-t { background: #3498db; color: #fff; }
        .game-area { height: 320px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; background: radial-gradient(circle, #222 0%, #000 70%);}
        .coin-container { width: 160px; height: 160px; perspective: 1000px; margin-bottom: 20px;}
        .coin { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; border-radius: 50%; box-shadow: 0 10px 30px rgba(241, 196, 15, 0.4); transition: transform 2s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .coin-face { position: absolute; width: 100%; height: 100%; border-radius: 50%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 900; color: #5c4000; text-shadow: 1px 1px 2px rgba(255,255,255,0.8); border: 8px solid #c29b0c; background: radial-gradient(circle, #ffeaa7 0%, #f1c40f 60%, #e67e22 100%); box-sizing: border-box;}
        .face-head { transform: rotateY(0deg); }
        .face-tail { transform: rotateY(180deg); }
        .status-text { font-size: 20px; font-weight: bold; color: #fff; text-shadow: 0 2px 5px #000; min-height: 25px;}
        .controls { padding: 15px; background: #111; border-top: 1px solid #333; border-radius: 20px 20px 0 0; margin-top: -10px; position: relative; z-index: 10;}
        .input-row { display: flex; justify-content: space-between; align-items: center; background: #000; border-radius: 8px; padding: 5px; margin-bottom: 15px; border: 1px solid #444;}
        .btn-pm { background: transparent; border: none; color: #f1c40f; font-size: 24px; padding: 5px 15px; cursor: pointer; font-weight: bold;}
        .bet-input { background: transparent; border: none; color: #fff; font-size: 20px; font-weight: bold; text-align: center; width: 100%; outline: none; }
        .quick-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px;}
        .q-btn { background: #222; border: 1px solid #444; color: #ccc; padding: 8px 0; border-radius: 5px; font-size: 13px; font-weight: bold; cursor: pointer; }
        .action-row { display: flex; gap: 15px; margin-bottom: 10px;}
        .btn-action { flex: 1; padding: 15px 0; border: none; border-radius: 10px; font-size: 22px; font-weight: 900; color: #000; cursor: pointer; text-transform: uppercase; box-shadow: 0 5px 0 rgba(0,0,0,0.5); transition: 0.1s;}
        .btn-action:active { transform: translateY(5px); box-shadow: 0 0 0 transparent; }
        .btn-head { background: linear-gradient(to bottom, #f1c40f, #e67e22); }
        .btn-tail { background: linear-gradient(to bottom, #3498db, #2980b9); color: #fff;}
        .auto-row { display: flex; gap: 10px; }
        .btn-auto { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #fff; background: #333; border: 1px solid #555; }
        .btn-auto-stop { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #fff; background: #e74c3c; border: 1px solid #c0392b; font-size: 16px;}
        .disabled { opacity: 0.5; pointer-events: none; filter: grayscale(100%);}
    </style>
</head>
<body>

    <div class="header">
        <div onclick="window.history.back()" style="font-size:24px; cursor:pointer; color:#888;">&lsaquo;</div>
        <div class="logo">BLOCK COIN</div>
        <div class="bal-box">₹ <span id="balance">0.00</span></div>
    </div>

    <div class="history" id="historyBox"></div>

    <div class="game-area">
        <div class="coin-container">
            <div class="coin" id="coin">
                <div class="coin-face face-head">HEAD</div>
                <div class="coin-face face-tail">TAIL</div>
            </div>
        </div>
        <div class="status-text" id="statusMsg">Place your bet!</div>
    </div>

    <div class="controls">
        <div style="font-size: 12px; color:#888; margin-bottom:5px; text-align:center;">Select Amount:</div>
        
        <div class="input-row" id="inputBox">
            <button class="btn-pm" onclick="chgBet(-10)">-</button>
            <input type="number" id="betInput" class="bet-input" value="10" onkeyup="checkMin()">
            <button class="btn-pm" onclick="chgBet(10)">+</button>
        </div>
        
        <div class="quick-row" id="quickBox">
            <button class="q-btn" onclick="setBet(10)">₹10</button>
            <button class="q-btn" onclick="setBet(50)">₹50</button>
            <button class="q-btn" onclick="setBet(100)">₹100</button>
            <button class="q-btn" onclick="setBet(500)">₹500</button>
        </div>

        <div class="action-row" id="manualControls">
            <button class="btn-action btn-head" id="btnHead" onclick="validatePlay('HEAD')">HEAD</button>
            <button class="btn-action btn-tail" id="btnTail" onclick="validatePlay('TAIL')">TAIL</button>
        </div>

        <div class="auto-row" id="autoStartControls">
            <button class="btn-auto" onclick="startAuto('HEAD')">🔄 AUTO HEAD</button>
            <button class="btn-auto" onclick="startAuto('TAIL')">🔄 AUTO TAIL</button>
        </div>
        
        <div class="auto-row" id="autoStopControls" style="display:none;">
            <button class="btn-auto-stop" onclick="stopAuto()">🛑 STOP AUTO PLAY</button>
        </div>

        <div style="text-align:center; font-size:11px; color:#666; margin-top:10px;">Payout: 1.94x</div>
    </div>

    <script>
        // 🚨 1. FIREBASE SETUP (INTEGRATED) 🚨
        var firebaseConfig = { 
            apiKey: "AIzaSyA9a_UA1cbr7sx0G1lu90ig18DfEDvmvgk", 
            authDomain: "ff-warzone-9c820.firebaseapp.com", 
            projectId: "ff-warzone-9c820", 
            storageBucket: "ff-warzone-9c820.firebasestorage.app", 
            messagingSenderId: "267357764090", 
            appId: "1:267357764090:web:0691111afd07cb0ff20c43" 
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        var fireDB = firebase.firestore();
        var userDocId = ""; 

        var bal = 0.00; 

        // 🚨 2. LIVE CLOUD SYNC 🚨
        function syncCloudBalance() {
            var savedUid = localStorage.getItem("r_uid");
            if(!savedUid) return;
            fireDB.collection("users").where("uid", "==", parseInt(savedUid)).get().then((snapshot) => {
                snapshot.forEach((doc) => {
                    userDocId = doc.id;
                    var data = doc.data();
                    bal = data.balance || 0;
                    document.getElementById("balance").innerText = bal.toFixed(2);
                    localStorage.setItem('r_bal', bal);
                });
            }).catch(err => console.log("Sync Error"));
        }

        var betAmt = 10;
        var isFlipping = false;
        var currentRotation = 0;
        var isAutoPlaying = false;
        var autoChoice = "";
        var autoTimer = null;

        var elCoin = document.getElementById("coin");
        var elStatus = document.getElementById("statusMsg");
        var btnHead = document.getElementById("btnHead");
        var btnTail = document.getElementById("btnTail");

        window.checkMin = function() {
            var val = parseInt(document.getElementById("betInput").value);
            if(isNaN(val) || val < 10) val = 10; betAmt = val;
        }
        window.chgBet = function(val) {
            if(isFlipping || isAutoPlaying) return;
            betAmt += val; if(betAmt < 10) betAmt = 10;
            document.getElementById("betInput").value = betAmt;
        }
        window.setBet = function(val) {
            if(isFlipping || isAutoPlaying) return;
            betAmt = val; document.getElementById("betInput").value = betAmt;
        }

        // ORIGINAL RIGGED LOGIC (UNTOUCHED)
        function getRiggedOutcome(userChoice) {
            var winChance = 0.40; 
            return (Math.random() < winChance) ? userChoice : (userChoice === "HEAD" ? "TAIL" : "HEAD");
        }

        // 🚨 3. SECURE GAME START (CLOUD DEDUCTION) 🚨
        window.validatePlay = function(userChoice) {
            checkMin();
            if(bal < betAmt) { alert("Low Balance!"); return; }
            if(!userDocId) return alert("Syncing... try again.");

            // Deduct from Firebase
            fireDB.collection("users").doc(userDocId).update({
                balance: firebase.firestore.FieldValue.increment(-betAmt)
            }).then(() => {
                bal -= betAmt;
                document.getElementById("balance").innerText = bal.toFixed(2);
                localStorage.setItem('r_bal', bal);
                playGame(userChoice);
            }).catch(err => alert("Bet Error"));
        }

        window.playGame = function(userChoice) {
            isFlipping = true;
            btnHead.classList.add("disabled"); btnTail.classList.add("disabled");
            elStatus.innerText = isAutoPlaying ? `Auto Flipping (${userChoice})...` : "Flipping...";
            elStatus.style.color = "#f1c40f";

            var finalOutcome = getRiggedOutcome(userChoice);
            var spins = 5; 
            var extraDegree = (finalOutcome === "HEAD") ? 0 : 180;
            currentRotation += (spins * 360) + extraDegree;
            
            var absoluteRot = currentRotation % 360;
            if (finalOutcome === "HEAD" && absoluteRot !== 0) currentRotation += 180;
            else if (finalOutcome === "TAIL" && absoluteRot === 0) currentRotation += 180;

            elCoin.style.transform = `rotateY(${currentRotation}deg)`;

            setTimeout(() => { handleResult(userChoice, finalOutcome); }, 2000);
        }

        // 🚨 4. SECURE RESULT HANDLER (CLOUD WINNINGS) 🚨
        function handleResult(userChoice, outcome) {
            isFlipping = false;
            addHistory(outcome);

            if (userChoice === outcome) {
                var winAmt = betAmt * 1.94;
                fireDB.collection("users").doc(userDocId).update({
                    balance: firebase.firestore.FieldValue.increment(winAmt)
                }).then(() => {
                    bal += winAmt;
                    document.getElementById("balance").innerText = bal.toFixed(2);
                    localStorage.setItem('r_bal', bal);
                    elStatus.innerText = "WON! ₹" + winAmt.toFixed(2);
                    elStatus.style.color = "#2ecc71";
                    if(isAutoPlaying) autoLoop();
                });
            } else {
                elStatus.innerText = "LOST!";
                elStatus.style.color = "#e74c3c";
                if(isAutoPlaying) autoLoop();
            }

            if(!isAutoPlaying) {
                btnHead.classList.remove("disabled"); btnTail.classList.remove("disabled");
            }
        }

        function autoLoop() {
            autoTimer = setTimeout(() => {
                if(isAutoPlaying) validatePlay(autoChoice);
            }, 1500);
        }

        window.startAuto = function(choice) {
            if(isFlipping) return;
            checkMin();
            if(bal < betAmt) return alert("Low Balance!");
            isAutoPlaying = true; autoChoice = choice;
            document.getElementById("autoStartControls").style.display = "none";
            document.getElementById("autoStopControls").style.display = "flex";
            document.getElementById("inputBox").classList.add("disabled");
            document.getElementById("quickBox").classList.add("disabled");
            btnHead.classList.add("disabled"); btnTail.classList.add("disabled");
            validatePlay(autoChoice);
        }

        window.stopAuto = function() {
            isAutoPlaying = false; clearTimeout(autoTimer);
            document.getElementById("autoStartControls").style.display = "flex";
            document.getElementById("autoStopControls").style.display = "none";
            document.getElementById("inputBox").classList.remove("disabled");
            document.getElementById("quickBox").classList.remove("disabled");
            if(!isFlipping) {
                btnHead.classList.remove("disabled"); btnTail.classList.remove("disabled");
                elStatus.innerText = "Auto Stopped."; elStatus.style.color = "#fff";
            }
        }

        function addHistory(res) {
            var bx = document.getElementById("historyBox");
            var badge = (res === "HEAD") ? `<span class="badge badge-h">H</span>` : `<span class="badge badge-t">T</span>`;
            bx.innerHTML = badge + bx.innerHTML;
        }

        window.onload = syncCloudBalance;
    </script>
</body>
</html>
